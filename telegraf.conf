# ----- CONFIGURACIÓN GLOBAL -----
[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  precision = "1ms"
  omit_hostname = false

# ----- PLUGINS DE ENTRADA -----
[[inputs.mqtt_consumer]]
  ## Dirección del broker MQTT
  servers = ["tcp://192.168.10.59:1883"]

  ## Tópicos a los que suscribirse. El "#" funciona como comodín (wildcard).
  topics = [
    "plc/sensors/#"
  ]

  ## Credenciales de acceso al broker
  username = "sat_mqtt"
  password = "2004Febrero."

  ## Configuración del parser de datos
  data_format = "json"

  ## Descomentado: extraemos el timestamp del JSON para mantener precision milisegundos original.
  ## NOTA: Para evitar rechazos en Grafana (DATA OUTSIDE TIME RANGE), asegúrate de que el equipo origen esté sincronizado por NTP.
  json_time_key = "timestamp"
  json_time_format = "unix_ms"  

  ## Restaurado: nombre por defecto de la métrica generada.
  ## En InfluxDB/VictoriaMetrics las buenas prácticas dictan agrupar en un 
  ## mismo 'measurement' (tabla) y distinguir por 'tags' (etiquetas) para optimizar el rendimiento.
  name_override = "plc_sensor"

  ## Extraer etiquetas (tags) directamente desde el tópico MQTT.
  ## El tópico tiene esta forma: plc/sensors/<equipo>/<variable>
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "plc/sensors/+/+"
    tags = "_/_/equipment/variable"

# ----- PLUGINS DE SALIDA -----

## 1. Salida hacia VictoriaMetrics (Para almacenamiento a largo plazo)
[[outputs.influxdb]]
  urls = ["http://192.168.10.58:8428"]
  ## No priorizamos latencia para el disco: usamos batching y enviamos cada 10 seg
  flush_interval = "10s"
  metric_batch_size = 5000

## 2. Salida hacia Grafana Live (Para streaming en tiempo real en la UI)
[[outputs.http]]
  ## IP y puerto de Grafana
  url = "http://192.168.10.57:3000/api/live/push/telegraf"

  ## Grafana Live espera los datos en formato Influx line protocol
  data_format = "influx"
  
  ## Si priorizamos latencia para Grafana: forzamos un envío ultra rapido
  flush_interval = "1s"

  [outputs.http.headers]
    ## Por seguridad, se debe incluir el token en una variable de entorno en el sistema Host (ej. export GRAFANA_LIVE_TOKEN="glsa_...")
    Authorization = "Bearer ${GRAFANA_LIVE_TOKEN}"
