# ----- CONFIGURACIÓN GLOBAL -----
[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  precision = "1ms"
  omit_hostname = false

# ----- PLUGINS DE ENTRADA -----
[[inputs.mqtt_consumer]]
  ## Dirección del broker MQTT
  servers = ["tcp://:1883"]

  ## Tópicos a los que suscribirse. El "#" funciona como comodín (wildcard).
  topics = [
    "plc/sensors/#"
  ]

  ## Credenciales de acceso al broker
  username = ""
  password = ""

  ## Configuración del parser de datos
  data_format = "json"

  ## Comentamos estas líneas para que Telegraf ignore el timestamp desfasado del PLC/LXC
  ## y estampe internamente la métrica con la hora real al recibirla.
  ## ¡ESTO SOLUCIONA EL "DATA OUTSIDE TIME RANGE" DE GRAFANA LIVE!
  # json_time_key = "timestamp"
  # json_time_format = "unix"  

  ## Restaurado: nombre por defecto de la métrica generada.
  ## En InfluxDB/VictoriaMetrics las buenas prácticas dictan agrupar en un 
  ## mismo 'measurement' (tabla) y distinguir por 'tags' (etiquetas) para optimizar el rendimiento.
  name_override = "plc_sensor"

  ## Extraer etiquetas (tags) directamente desde el tópico MQTT.
  ## El tópico tiene esta forma: plc/sensors/<equipo>/<variable>
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "plc/sensors/+/+"
    tags = "_/_/equipment/variable"


# ----- PLUGINS DE SALIDA -----

## 1. Salida hacia VictoriaMetrics (Para almacenamiento a largo plazo)
[[outputs.influxdb]]
  urls = ["http://:8428"]


## 2. Salida hacia Grafana Live (Para streaming en tiempo real en la UI)
[[outputs.http]]
  ## IP y puerto de Grafana
  url = "http://:3000/api/live/push/telegraf"
  
  ## Grafana Live espera los datos en formato Influx line protocol
  data_format = "influx"
  
  [outputs.http.headers]
    ## Debes reemplazar esto con un Service Account Token válido de Grafana
    ## que tenga permisos de escritura (Metrics Publisher).
    Authorization = "Bearer "